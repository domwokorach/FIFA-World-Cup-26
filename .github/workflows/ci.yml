# Lint, build, smoke-test and a11y-audit every pull request.
# (smoke.mjs/a11y.mjs default to /usr/bin/google-chrome, which is preinstalled
# on GitHub's ubuntu-latest runners.)
name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run build
      - name: Smoke test (every route, console/page errors)
        run: |
          bun run preview &  # serves dist on http://localhost:4173/
          for i in $(seq 1 30); do
            curl -fsS http://localhost:4173/ >/dev/null 2>&1 && break
            sleep 1
          done
          bun scripts/smoke.mjs
      - name: Accessibility audit (axe-core, serves dist itself)
        run: bun scripts/a11y.mjs
